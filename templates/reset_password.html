<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><script>localStorage.removeItem("civic_lang");</script><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password – CivicConnect</title>
<link rel="stylesheet" href="/static/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page split-auth-page">
<div class="split-auth-card">
  <div class="split-left">
    <div class="split-brand"><span class="split-brand-icon">C</span> CivicConnect</div>
    <div class="split-tagline">Set a New<br>Password.</div>
    <p class="split-desc">Choose a strong password — at least 6 characters.</p>
  </div>
  <div class="split-right">
    <h2 class="split-title">Reset Password</h2>
    <p class="split-subtitle">Enter your new password below.</p>
    <div id="msg" class="msg hidden"></div>
    <div id="formWrap">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="password" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="" onkeydown="if(event.key==='Enter')doReset()">
      </div>
      <button class="btn btn-primary btn-full split-btn" id="resetBtn" onclick="doReset()">Set New Password →</button>
      <div class="split-divider"></div>
      <p class="split-switch">Back to <a href="/login">Login</a></p>
    </div>
  </div>
</div>
<script>
const token = new URLSearchParams(window.location.search).get("token");
if (!token) {
  document.getElementById("formWrap").innerHTML = `<div style="text-align:center;color:#ef4444;padding:1.5rem 0;">
    <div style="font-size:2.5rem;">⚠️</div>
    <p>Invalid reset link. <a href="/forgot-password">Request a new one</a>.</p></div>`;
}
async function doReset() {
  const pw   = document.getElementById("password").value;
  const conf = document.getElementById("confirm").value;
  const msg  = document.getElementById("msg");
  const btn  = document.getElementById("resetBtn");
  if (!pw) { msg.textContent="Please enter a password."; msg.className="msg error"; return; }
  if (pw !== conf) { msg.textContent="Passwords do not match."; msg.className="msg error"; return; }
  if (pw.length < 6) { msg.textContent="Password must be at least 6 characters."; msg.className="msg error"; return; }
  btn.disabled=true; btn.textContent="Resetting…";
  const res  = await fetch("/api/reset-password", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({token, password: pw})
  });
  const data = await res.json();
  if (res.ok) {
    document.getElementById("formWrap").innerHTML = `
      <div style="text-align:center;padding:1.5rem 0;">
        <div style="font-size:3rem;margin-bottom:.8rem;">🎉</div>
        <h3 style="color:#16a34a;font-family:'Playfair Display',serif;margin-bottom:.5rem;">Password Reset!</h3>
        <p style="color:#475569;font-size:.9rem;">${data.message}</p>
        <a href="/login" class="btn btn-primary" style="margin-top:1.2rem;display:inline-block;">Login Now</a>
      </div>`;
  } else {
    msg.textContent = data.error; msg.className="msg error";
    btn.disabled=false; btn.textContent="Set New Password →";
  }
}
</script>
</body>
</html>
