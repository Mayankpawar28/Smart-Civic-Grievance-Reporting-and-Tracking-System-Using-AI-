<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><script>localStorage.removeItem("civic_lang");</script><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password – CivicConnect</title>
<link rel="stylesheet" href="/static/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page split-auth-page">
<div class="split-auth-card">
  <div class="split-left">
    <div class="split-brand"><span class="split-brand-icon">C</span> CivicConnect</div>
    <div class="split-tagline">Reset Your<br>Password.</div>
    <p class="split-desc">Enter your Gmail and we'll send a secure reset link valid for 30 minutes.</p>
    <ul class="split-features">
      <li>✓ Secure reset via email</li>
      <li>✓ Link expires in 30 minutes</li>
      <li>✓ No account? <a href="/register" style="color:#fff;font-weight:700;">Register here</a></li>
    </ul>
  </div>
  <div class="split-right">
    <h2 class="split-title">Forgot Password</h2>
    <p class="split-subtitle">We'll send a reset link to your Gmail.</p>
    <div id="msg" class="msg hidden"></div>
    <div id="formWrap">
      <div class="form-group">
        <label>Gmail Address</label>
        <input type="email" id="email" placeholder="yourname@gmail.com" onkeydown="if(event.key==='Enter')doSubmit()">
      </div>
      <button class="btn btn-primary btn-full split-btn" id="submitBtn" onclick="doSubmit()">Send Reset Link →</button>
      <div class="split-divider"></div>
      <p class="split-switch">Remember your password? <a href="/login">Login</a></p>
    </div>
  </div>
</div>
<script>
async function doSubmit() {
  const email = document.getElementById("email").value.trim();
  const msg   = document.getElementById("msg");
  const btn   = document.getElementById("submitBtn");
  if (!email) { msg.textContent="Please enter your email."; msg.className="msg error"; return; }
  btn.disabled=true; btn.textContent="Sending…";
  const res  = await fetch("/api/forgot-password", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({email})
  });
  const data = await res.json();
  if (res.ok) {
    document.getElementById("formWrap").innerHTML = `
      <div style="text-align:center;padding:1.5rem 0;">
        <div style="font-size:3rem;margin-bottom:.8rem;">📧</div>
        <h3 style="color:#16a34a;font-family:'Playfair Display',serif;margin-bottom:.5rem;">Check your inbox!</h3>
        <p style="color:#475569;font-size:.9rem;">${data.message}</p>
        <a href="/login" class="btn btn-primary" style="margin-top:1.2rem;display:inline-block;">Back to Login</a>
      </div>`;
  } else {
    msg.textContent = data.error; msg.className="msg error";
    btn.disabled=false; btn.textContent="Send Reset Link →";
  }
}
</script>
</body>
</html>
